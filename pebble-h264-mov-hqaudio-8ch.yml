name: pebble-h264-mov-hqaudio-8ch
description: H.264 High 4:2:2 playout master for Pebble with 8 PCM mono tracks (4 stereo language pairs from labeled inputs)
scaling: bicubic
encodes:
  - type: X264Encode
    suffix: _pebble_h264_hqa
    height: 1080
    format: mxf
    params:
      b:v: 35M
      maxrate: 35M
      minrate: 35M
      bufsize: 35M
      r: 50
      fps_mode: cfr
      pix_fmt: yuv422p
      profile:v: high422
      level: 4.2
      color_range: tv
      colorspace: bt709
      color_trc: bt709
      color_primaries: bt709
    x264-params:
      nal-hrd: cbr
      force-cfr: 1
      keyint: 33
      keyint_min: 33
      bframes: 0
      ref: 1
      cabac: 1
      scenecut: 0
    audioEncodes:
      # lang0 = original language stereo pair (audio stream 0 of mezz)
      - type: AudioEncode
        codec: pcm_s16le
        sampleRate: 48000
        channelLayout: mono
        inputLabel: lang0
        audioMixPreset: monoLeft
        filters:
          - "apad=pad_dur=0.1"
      - type: AudioEncode
        codec: pcm_s16le
        sampleRate: 48000
        channelLayout: mono
        inputLabel: lang0
        audioMixPreset: monoRight
        filters:
          - "apad=pad_dur=0.1"
      # lang1..lang3 = dub stereo pairs (audio streams 1..3 of mezz). Optional so
      # sources with fewer than 4 stereo pairs do not fail the job.
      - type: AudioEncode
        codec: pcm_s16le
        sampleRate: 48000
        channelLayout: mono
        inputLabel: lang1
        audioMixPreset: monoLeft
        optional: true
        filters:
          - "apad=pad_dur=0.1"
      - type: AudioEncode
        codec: pcm_s16le
        sampleRate: 48000
        channelLayout: mono
        inputLabel: lang1
        audioMixPreset: monoRight
        optional: true
        filters:
          - "apad=pad_dur=0.1"
      - type: AudioEncode
        codec: pcm_s16le
        sampleRate: 48000
        channelLayout: mono
        inputLabel: lang2
        audioMixPreset: monoLeft
        optional: true
        filters:
          - "apad=pad_dur=0.1"
      - type: AudioEncode
        codec: pcm_s16le
        sampleRate: 48000
        channelLayout: mono
        inputLabel: lang2
        audioMixPreset: monoRight
        optional: true
        filters:
          - "apad=pad_dur=0.1"
      - type: AudioEncode
        codec: pcm_s16le
        sampleRate: 48000
        channelLayout: mono
        inputLabel: lang3
        audioMixPreset: monoLeft
        optional: true
        filters:
          - "apad=pad_dur=0.1"
      - type: AudioEncode
        codec: pcm_s16le
        sampleRate: 48000
        channelLayout: mono
        inputLabel: lang3
        audioMixPreset: monoRight
        optional: true
        filters:
          - "apad=pad_dur=0.1"
